name: AstraVoice CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile and Syntax Check code
      run: |
        python -m py_compile app.py dashboard.py services/app_launcher.py services/history_service.py services/news_service.py services/reminder_service.py services/speech_service.py services/tts_service.py services/weather_service.py ui/components.py ui/theme.py
